name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    env:
      RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
    strategy:
      matrix:
        java: [25]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build (clean + tests)
        run: ./gradlew clean build --no-daemon --console=plain

      - name: List produced artifacts
        run: ls -la build/libs || true

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

      # Try to create a tag by pushing with a Personal Access Token (will trigger other workflows)
      - name: Create and push tag using PAT (triggers other workflows)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.RELEASE_PAT != ''
        env:
          TAG_NAME: v${{ github.run_number }}
          REPO_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          echo "Preparing to create tag $TAG_NAME using PAT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # set remote using PAT so the push will authenticate and trigger other workflows
          git remote set-url origin https://x-access-token:$REPO_PAT@github.com/${{ github.repository }}.git

          # create annotated tag and push
          git tag -a "$TAG_NAME" -m "Automated tag $TAG_NAME by GitHub Actions"
          git push origin "refs/tags/$TAG_NAME"

      # Fallback: if no PAT is configured, create a Release directly with GITHUB_TOKEN
      - name: Create Release (fallback when no PAT)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.RELEASE_PAT == ''
        id: create_release_fallback
        uses: actions/create-release@v1
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: "Automated release from CI (no PAT available), run ${{ github.run_id }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build runAppJar for fallback release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.RELEASE_PAT == ''
        run: ./gradlew runAppJar --no-daemon --console=plain

      - name: Detect runApp JAR path (fallback)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.RELEASE_PAT == ''
        run: |
          set -e
          JAR=$(ls build/libs/runApp*.jar | head -n1)
          echo "Found JAR: $JAR"
          echo "JAR_PATH=$JAR" >> $GITHUB_ENV

      - name: Prepare source archive (fallback)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.RELEASE_PAT == ''
        run: git archive --format=zip --output=source-v${{ github.run_number }}.zip HEAD

      - name: Upload runApp JAR to fallback Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.RELEASE_PAT == ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release_fallback.outputs.upload_url }}
          asset_path: ${{ env.JAR_PATH }}
          asset_name: ${{ github.repository }}-v${{ github.run_number }}.jar
          asset_content_type: application/java-archive

      - name: Upload source archive to fallback Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.RELEASE_PAT == ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release_fallback.outputs.upload_url }}
          asset_path: source-v${{ github.run_number }}.zip
          asset_name: ${{ github.repository }}-v${{ github.run_number }}-sources.zip
          asset_content_type: application/zip

      - name: Show pushed tags (debug)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: git ls-remote --tags origin || true

  release:
    name: Create Release on tag
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout (tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Build release JAR
        run: ./gradlew clean build --no-daemon --console=plain

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: "Automated release from GitHub Actions for ${{ github.ref_name }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JAR to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/libs/*.jar
          asset_name: ${{ github.repository }}-${{ github.ref_name }}.jar
          asset_content_type: application/java-archive

