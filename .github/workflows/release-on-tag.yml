name: Release on tag

on:
  push:
    tags: ['*']

permissions:
  contents: write

jobs:
  release:
    name: Build and create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build release JAR (including runAppJar)
        run: ./gradlew clean build runAppJar --no-daemon --console=plain

      - name: Detect runApp JAR path
        run: |
          set -e
          JAR=$(ls build/libs/runApp*.jar | head -n1)
          echo "Found JAR: $JAR"
          echo "JAR_PATH=$JAR" >> $GITHUB_ENV

      - name: Prepare source archive
        run: git archive --format=zip --output=source-${{ github.ref_name }}.zip HEAD

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: "Automated release from GitHub Actions for ${{ github.ref_name }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload runApp JAR to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.JAR_PATH }}
          asset_name: ${{ github.repository }}-${{ github.ref_name }}.jar
          asset_content_type: application/java-archive

      - name: Upload source archive to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: source-${{ github.ref_name }}.zip
          asset_name: ${{ github.repository }}-${{ github.ref_name }}-sources.zip
          asset_content_type: application/zip
